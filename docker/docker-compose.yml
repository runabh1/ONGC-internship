version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: ongc_postgres
    environment:
      POSTGRES_DB: ongc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    networks:
      - monitoring

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ../config:/etc/prometheus:ro
    ports:
      - '9090:9090'
    networks:
      - monitoring

  alertmanager:
    image: prom/alertmanager:latest
    container_name: alertmanager
    volumes:
      - ../config/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    ports:
      - '9093:9093'
    networks:
      - monitoring

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ongc_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ongc
      PROMETHEUS_URL: http://prometheus:9090
      COLLECT_INTERVAL: 60
    depends_on:
      - postgres
      - prometheus
    ports:
      - '8000:8000'
    networks:
      - monitoring

  collector:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    container_name: ongc_collector
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/ongc
      PROMETHEUS_URL: http://prometheus:9090
      COLLECT_INTERVAL: 60
    depends_on:
      - postgres
      - prometheus
    command: ["python", "-m", "backend.collector"]
    networks:
      - monitoring

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
      args:
        REACT_APP_API_URL: http://backend:8000
    container_name: ongc_frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
    networks:
      - monitoring

volumes:
  pgdata:

networks:
  monitoring:
    driver: bridge
