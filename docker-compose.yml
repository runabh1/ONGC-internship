version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: ongc_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Arunabh1}
      POSTGRES_DB: ongc
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  prometheus:
    image: prom/prometheus:latest
    container_name: ongc_prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./config/nodes.yaml:/etc/prometheus/nodes.yaml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
    restart: unless-stopped
    depends_on:
      - node_exporter

  node_exporter:
    image: prom/node-exporter:latest
    container_name: ongc_node_exporter
    ports:
      - "9100:9100"
    restart: unless-stopped
    # On Windows Docker Desktop mounting host root (/host) or /proc,/sys is not supported
    # and causes "not a shared or slave mount" errors. Use a minimal node_exporter config
    # for local dev on Windows (no host mounts). To collect host metrics run this stack
    # on Linux or enable appropriate mounts when using a Linux Docker host.
    command:
      - '--collector.logind'

  backend:
    build: 
      context: .
      dockerfile: backend/Dockerfile
    container_name: ongc_backend
    env_file: .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-Arunabh1}@db:5432/ongc
      - PROMETHEUS_URL=http://prometheus:9090
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config:ro
      - "C:/Users/aruna/.ssh:/root/.ssh:ro"
    depends_on:
      db:
        condition: service_healthy
      prometheus:
        condition: service_started
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ongc_frontend
    ports:
      - "3001:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  postgres_data:
  prometheus_data:
