global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s
alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']
rule_files:
  - 'rules/alert_rules.yml'
scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node_exporter'
    file_sd_configs:
      - files:
          - 'nodes.yaml'
    relabel_configs:
      - source_labels: ['__address__']
        target_label: 'instance'
        regex: '(.*):9100'
        replacement: '$1'
