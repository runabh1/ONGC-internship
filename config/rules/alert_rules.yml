groups:
  - name: node_alerts
    rules:
      - alert: HighCpuUsage
        expr: 100 - (avg by (instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.instance }}"
          description: "CPU usage is above 85% for more than 2 minutes."

      - alert: HighMemoryUsage
        expr: (node_memory_MemTotal_bytes - node_memory_MemAvailable_bytes) / node_memory_MemTotal_bytes * 100 > 80
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.instance }}"
          description: "Memory usage is above 80% for more than 3 minutes."

      - alert: HighDiskUsage
        expr: (node_filesystem_size_bytes{fstype!~"tmpfs|rootfs"} - node_filesystem_free_bytes{fstype!~"tmpfs|rootfs"}) / node_filesystem_size_bytes{fstype!~"tmpfs|rootfs"} * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High disk usage on {{ $labels.instance }}"
          description: "Disk usage is above 85% for more than 5 minutes on a mounted filesystem."

      - alert: NodeDown
        expr: absent(up{job="node_exporter"})
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Node down detected"
          description: "No heartbeat from node_exporter for {{ $labels.instance }}. The node may be offline or unreachable."
